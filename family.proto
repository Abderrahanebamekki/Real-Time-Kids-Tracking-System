syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.family.proto";
option java_outer_classname = "FamilyProto";

package family;

service ParentInfoService {
  rpc GetParentInfo (GetParentInfoRequest) returns (GetParentInfoResponse);
}

message GetParentInfoRequest {
  string userId = 1;
  string childId = 2;
}

message GetParentInfoResponse {
  string parentId = 1;
  bool isValid = 2;
  string errorMessage = 3;
}
