spring:
  application:
    name: daily-tracking-service
  kafka:
    bootstrap-servers: kafka:9092
  eureka:
    client:
      serviceUrl:
        defaultZone: http://eureka-server:8761/eureka/
    consumer:
      group-id: daily-tracking-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.example.dailytrackingservice.dto.Envelope
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/dtracking
    username: postgres
    password: 12345678
    pool:
      enabled: true
      max-size: 10
      initial-size: 5
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin
  data:
    redis:
      host: redis
      port: 6379

app:
  kafka:
    topic:
     vitals: vitals
     battery: battery
     gps: gps

server:
  port: 8089


