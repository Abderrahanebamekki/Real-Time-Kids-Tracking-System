services:

  # ── Infrastructure ──────────────────────────────────────────

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092   # ✅ fixed
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"    # dashboard → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dtracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    volumes:
      - postgres_data:/var/lib/postgresql/data

  emqx:
    image: emqx:5.8
    ports:
      - "1883:1883"
  # ── Microservices ────────────────────────────────────────────

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    restart: on-failure

  ingestion-service:
    build: ./ingestion-service
    container_name: ingestion-service
    depends_on:
      - eureka-server
      - kafka
    restart: on-failure

  daily-tracking-service:
    build: ./daily-tracking-service
    container_name: daily-tracking-service
    ports:
      - "8089:8089"
    depends_on:
      - eureka-server
      - kafka
      - postgres
      - rabbitmq
      - redis
    restart: on-failure

  geofencing-service:
    build: ./geofencing-service
    container_name: geofencing-service
    depends_on:
      - eureka-server
      - redis
      - rabbitmq
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - eureka-server
      - rabbitmq
    restart: on-failure

  identity-family:
    build: ./identity-family
    container_name: identity-family
    depends_on:
      - eureka-server
      - postgres
    restart: on-failure

  device-gateway:
    build: ./device-gateway
    container_name: device-gateway
    depends_on:
      - eureka-server
      - kafka
    restart: on-failure

volumes:
  postgres_data: