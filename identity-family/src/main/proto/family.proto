syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.identityfamily.grpc";
option java_outer_classname = "FamilyServiceProto";

package family;

// The request message containing the userId and childId
message ValidateChildRequest {
  string userId = 1;
  string childId = 2;
}

// The response message containing the validation result
message ValidateChildResponse {
  bool valid = 1;
  string parentId = 2;
  string message = 3;
}

// The greeting service definition.
service FamilyService {
  // Validates if a child belongs to a user and returns the parent ID
  rpc ValidateChild (ValidateChildRequest) returns (ValidateChildResponse);
}
