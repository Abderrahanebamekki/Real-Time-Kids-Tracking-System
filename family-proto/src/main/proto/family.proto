syntax = "proto3";

package identityfamily.v1;

option java_multiple_files = true;
option java_package = "com.example.identityfamily.grpc";
option java_outer_classname = "IdentityFamilyProto";

service IdentityFamilyService {
  rpc GetParentId(GetParentIdRequest) returns (GetParentIdResponse);
}

message GetParentIdRequest {
  string user_id = 1;
  string child = 2;
}

message GetParentIdResponse {
  string parent_id = 1;
}