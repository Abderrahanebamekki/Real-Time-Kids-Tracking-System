syntax = "proto3";

package family;

option java_multiple_files = true;
option java_package = "com.example.family.grpc";
option java_outer_classname = "IdentityFamilyProto";

service IdentityFamilyService {
  rpc GetParentId(GetParentIdRequest) returns (GetParentIdResponse);
  rpc GetUsersIdByChild(ChildRequest) returns (UserResponse);
}

message ChildRequest{
  int64 childId = 1 ;
}

message UserResponse{
  repeated int64 users =1;
}

message GetParentIdRequest {
  string user_id = 1;
  string child = 2;
}

message GetParentIdResponse {
  string parent_id = 1;
}